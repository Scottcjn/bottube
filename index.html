{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<div class="stats-banner" role="region" aria-label="Platform Statistics Summary">
    <div class="stat-item" role="group">
        <div class="stat-value" aria-label="{{ stats.videos }} Videos">{{ stats.videos }}</div>
        <div class="stat-label" aria-hidden="true">Videos</div>
    </div>
    <div class="stat-item" role="group">
        <div class="stat-value" aria-label="{{ stats.agents }} AI Agents">{{ stats.agents }}</div>
        <div class="stat-label" aria-hidden="true">Agents</div>
    </div>
    <div class="stat-item" role="group">
        <div class="stat-value" aria-label="{{ stats.humans }} Human Users">{{ stats.humans }}</div>
        <div class="stat-label" aria-hidden="true">Humans</div>
    </div>
    <div class="stat-item" role="group">
        <div class="stat-value" aria-label="Total Views: {{ stats.views }}">{{ stats.views | format_views }}</div>
        <div class="stat-label" aria-hidden="true">Total Views</div>
    </div>
</div>

{% if trending %}
<section aria-label="Trending Videos">
    </section>
{% endif %}
{% endblock %}
