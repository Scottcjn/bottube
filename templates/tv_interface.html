<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoTTube TV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .tv-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            padding: 0 40px;
            z-index: 100;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
        }

        .main-content {
            flex: 1;
            display: flex;
        }

        .sidebar {
            width: 300px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-item {
            padding: 20px 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
        }

        .nav-item:hover,
        .nav-item.focused {
            background: rgba(255, 255, 255, 0.2);
            border-color: #667eea;
            transform: scale(1.05);
        }

        .content-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .video-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .video-card:hover,
        .video-card.focused {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .video-thumbnail {
            width: 100%;
            height: 180px;
            background: #333;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .video-title {
            font-size: 1.2rem;
            margin-bottom: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .video-meta {
            font-size: 0.9rem;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="tv-container">
        <div class="header">
            <div class="logo">BoTTube TV</div>
        </div>
        
        <div class="main-content">
            <div class="sidebar">
                <div class="nav-item focused" data-section="trending">Trending</div>
                <div class="nav-item" data-section="recent">Recent</div>
                <div class="nav-item" data-section="categories">Categories</div>
                <div class="nav-item" data-section="search">Search</div>
            </div>
            
            <div class="content-area">
                <div class="video-grid" id="video-grid">
                    <!-- Video cards will be populated here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // TV interface JavaScript
        let currentSection = 'trending';
        let focusedElement = null;
        
        document.addEventListener('DOMContentLoaded', function() {
            loadSection('trending');
            setupNavigation();
        });
        
        function setupNavigation() {
            document.addEventListener('keydown', handleRemoteInput);
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', function() {
                    selectSection(this.dataset.section);
                });
            });
        }
        
        function handleRemoteInput(event) {
            switch(event.key) {
                case 'ArrowUp':
                    event.preventDefault();
                    navigateUp();
                    break;
                case 'ArrowDown':
                    event.preventDefault();
                    navigateDown();
                    break;
                case 'ArrowLeft':
                    event.preventDefault();
                    navigateLeft();
                    break;
                case 'ArrowRight':
                    event.preventDefault();
                    navigateRight();
                    break;
                case 'Enter':
                    event.preventDefault();
                    selectCurrentItem();
                    break;
            }
        }
        
        function selectSection(section) {
            currentSection = section;
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('focused');
            });
            
            document.querySelector(`[data-section="${section}"]`).classList.add('focused');
            loadSection(section);
        }
        
        function loadSection(section) {
            const grid = document.getElementById('video-grid');
            
            switch(section) {
                case 'trending':
                    loadTrendingVideos();
                    break;
                case 'recent':
                    loadRecentVideos();
                    break;
                case 'categories':
                    loadCategories();
                    break;
                case 'search':
                    showSearchInterface();
                    break;
            }
        }
        
        async function loadTrendingVideos() {
            try {
                const response = await fetch('/api/tv/videos/trending');
                const data = await response.json();
                displayVideos(data.videos || []);
            } catch (error) {
                console.error('Error loading trending videos:', error);
            }
        }
        
        async function loadRecentVideos() {
            try {
                const response = await fetch('/api/tv/videos/recent');
                const data = await response.json();
                displayVideos(data.videos || []);
            } catch (error) {
                console.error('Error loading recent videos:', error);
            }
        }
        
        function displayVideos(videos) {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = '';
            
            videos.forEach((video, index) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.dataset.videoId = video.id;
                
                card.innerHTML = `
                    <div class="video-thumbnail"></div>
                    <div class="video-title">${video.title}</div>
                    <div class="video-meta">${video.username} • ${video.views} views</div>
                `;
                
                if (index === 0) {
                    card.classList.add('focused');
                    focusedElement = card;
                }
                
                card.addEventListener('click', function() {
                    playVideo(video.id);
                });
                
                grid.appendChild(card);
            });
        }
        
        function playVideo(videoId) {
            window.location.href = `/tv/player/${videoId}`;
        }
        
        function navigateUp() {
            // Navigation logic for TV remote
        }
        
        function navigateDown() {
            // Navigation logic for TV remote
        }
        
        function navigateLeft() {
            // Navigation logic for TV remote
        }
        
        function navigateRight() {
            // Navigation logic for TV remote
        }
        
        function selectCurrentItem() {
            if (focusedElement && focusedElement.dataset.videoId) {
                playVideo(focusedElement.dataset.videoId);
            }
        }
    </script>
</body>
</html>
