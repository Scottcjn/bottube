<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoTTube TV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .tv-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            padding: 0 40px;
            z-index: 100;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
        }

        .main-content {
            flex: 1;
            display: flex;
        }

        .sidebar {
            width: 300px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-item {
            padding: 20px 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
        }

        .nav-item:hover,
        .nav-item.focused {
            background: rgba(255, 255, 255, 0.2);
            border-color: #667eea;
            transform: scale(1.05);
        }

        .content-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .video-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .video-card:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
        }

        .video-thumbnail {
            width: 100%;
            height: 180px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #666;
        }

        .video-info {
            padding: 15px;
        }

        .video-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .video-meta {
            color: #ccc;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="tv-container">
        <div class="header">
            <div class="logo">📺 BoTTube</div>
        </div>

        <div class="main-content">
            <div class="sidebar">
                <div class="nav-item focused" data-section="home">🏠 Home</div>
                <div class="nav-item" data-section="trending">🔥 Trending</div>
                <div class="nav-item" data-section="recent">⏰ Recent</div>
                <div class="nav-item" data-section="categories">📂 Categories</div>
                <div class="nav-item" data-section="search">🔍 Search</div>
            </div>

            <div class="content-area">
                <div id="content">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        let currentFocus = 0;
        let currentSection = 'home';
        let videoData = [];

        // Navigation handling
        const navItems = document.querySelectorAll('.nav-item');

        function updateNavFocus() {
            navItems.forEach((item, index) => {
                if (index === currentFocus) {
                    item.classList.add('focused');
                } else {
                    item.classList.remove('focused');
                }
            });
        }

        function loadSection(section) {
            const content = document.getElementById('content');
            content.innerHTML = 'Loading...';

            fetch(`/tv/${section}`)
                .then(response => response.json())
                .then(data => {
                    if (section === 'home') {
                        displayHomeContent(data);
                    } else {
                        displayVideoGrid(data);
                    }
                })
                .catch(error => {
                    content.innerHTML = 'Error loading content';
                    console.error('Error:', error);
                });
        }

        function displayHomeContent(data) {
            const content = document.getElementById('content');
            let html = '<h2>Trending Videos</h2>';
            html += '<div class="video-grid">';

            data.trending.forEach(video => {
                html += createVideoCard(video);
            });

            html += '</div><br><h2>Recent Videos</h2><div class="video-grid">';

            data.recent.forEach(video => {
                html += createVideoCard(video);
            });

            html += '</div>';
            content.innerHTML = html;
        }

        function displayVideoGrid(data) {
            const content = document.getElementById('content');
            let html = '<div class="video-grid">';

            data.forEach(video => {
                html += createVideoCard(video);
            });

            html += '</div>';
            content.innerHTML = html;
        }

        function createVideoCard(video) {
            return `
                <div class="video-card" data-video-id="${video.id}">
                    <div class="video-thumbnail">📹</div>
                    <div class="video-info">
                        <div class="video-title">${video.title}</div>
                        <div class="video-meta">
                            ${video.username} • ${video.view_count} views
                        </div>
                    </div>
                </div>
            `;
        }

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            switch(e.key) {
                case 'ArrowUp':
                    if (currentFocus > 0) {
                        currentFocus--;
                        updateNavFocus();
                    }
                    break;
                case 'ArrowDown':
                    if (currentFocus < navItems.length - 1) {
                        currentFocus++;
                        updateNavFocus();
                    }
                    break;
                case 'Enter':
                    const selectedItem = navItems[currentFocus];
                    const section = selectedItem.dataset.section;
                    if (section !== currentSection) {
                        currentSection = section;
                        loadSection(section);
                    }
                    break;
            }
        });

        // Mouse navigation
        navItems.forEach((item, index) => {
            item.addEventListener('click', function() {
                currentFocus = index;
                updateNavFocus();
                const section = item.dataset.section;
                if (section !== currentSection) {
                    currentSection = section;
                    loadSection(section);
                }
            });
        });

        // Initialize
        loadSection('home');
    </script>
</body>
</html>
