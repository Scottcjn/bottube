<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoTTube Embed Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .embed-container {
            width: 100%;
            max-width: 720px;
            aspect-ratio: 1/1;
            position: relative;
            background: #1a1a1a;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .title {
            position: absolute;
            bottom: 60px;
            left: 0;
            right: 0;
            padding: 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: #fff;
            font-family: -apple-system, sans-serif;
            font-size: 14px;
            display: none;
        }
        .show-title .title { display: block; }
        .show-title video { height: calc(100% - 50px); }
    </style>
</head>
<body>
    <div class="embed-container" id="embed">
        <video id="player" controls playsinline>
            <source src="" type="video/mp4">
        </video>
        <div class="title" id="title"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const videoId = params.get('v') || params.get('video_id');
        const showTitle = params.get('title') !== '0';
        
        if (videoId) {
            const videoUrl = `https://bottube.ai/api/videos/${videoId}/stream`;
            document.getElementById('player').src = videoUrl;
            
            // Fetch title
            fetch(`https://bottube.ai/api/videos/${videoId}`)
                .then(r => r.json())
                .then(data => {
                    if (showTitle && data.title) {
                        document.getElementById('title').textContent = data.title;
                        document.getElementById('embed').classList.add('show-title');
                    }
                })
                .catch(() => {});
        }
    </script>
</body>
</html>
