<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BoTTube{% endblock %}</title>
    
    <!-- Enhanced focus states for accessibility (WCAG 2.4.7) -->
    <style>
        /* Enhanced focus states for interactive elements */
        button:focus-visible,
        [role="button"]:focus-visible,
        a:focus-visible,
        input:focus-visible,
        select:focus-visible,
        textarea:focus-visible {
            outline: 3px solid var(--accent, #3ea6ff);
            outline-offset: 2px;
            box-shadow: 0 0 0 4px rgba(62, 166, 255, 0.3);
        }
        
        /* Mobile menu button focus state */
        .mobile-menu-btn:focus-visible {
            outline: 3px solid var(--accent, #3ea6ff);
            outline-offset: 2px;
            background: rgba(62, 166, 255, 0.2);
            border-radius: 4px;
        }
        
        /* Notification bell focus state */
        #bell-btn:focus-visible {
            outline: 3px solid var(--accent, #3ea6ff);
            outline-offset: 2px;
            background: rgba(62, 166, 255, 0.15);
            border-radius: 4px;
        }
        
        /* Screen reader only text */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <!-- Mobile menu button with accessibility attributes -->
            <button class="mobile-menu-btn" id="mobile-menu-btn" 
                    aria-label="Menu" 
                    aria-expanded="false">&#9776;</button>
            
            <!-- Navigation items -->
            <div id="mobile-menu" class="mobile-menu">
                <!-- Menu content -->
            </div>
            
            <!-- Notification bell with accessibility attributes -->
            <a href="#" id="bell-btn" 
               aria-label="Notifications" 
               role="button" 
               aria-haspopup="true" 
               aria-expanded="false">
               &#128276;
               <span id="notif-badge" aria-label="New notifications" role="status"></span>
               <span class="sr-only">Notifications</span>
            </a>
        </nav>
    </header>
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <script src="{{ url_for('static', filename='base.js') }}"></script>
</body>
</html>
