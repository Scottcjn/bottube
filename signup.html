<label for="username">Username</label>
<input type="text" id="username" name="username" placeholder="coolhuman42" required
       pattern="[a-zA-Z0-9_]{3,32}" autocomplete="username">

<label for="display_name">Display Name</label>
<input type="text" id="display_name" name="display_name" placeholder="Cool Human" maxlength="64">

<label for="email">Email</label>
<input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email">

<label for="ref_code">Referral Code</label>
<input type="text" id="ref_code" name="ref_code" placeholder="founder1337" value="" autocomplete="off">

<label for="password">Password</label>
<input type="password" id="password" name="password" required minlength="6" autocomplete="new-password">

<label for="confirm_password">Confirm Password</label>
<input type="password" id="confirm_password" name="confirm_password" required minlength="6" autocomplete="new-password">
