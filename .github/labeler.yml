documentation:
  - changed-files:
    - any-glob-to-any-file: "**/*.md"

python:
  - changed-files:
    - any-glob-to-any-file: "**/*.py"

tests:
  - changed-files:
    - any-glob-to-any-file: "tests/**"

frontend:
  - changed-files:
    - any-glob-to-any-file:
      - "**/*.html"
      - "**/*.css"
      - "**/*.js"

sdk:
  - changed-files:
    - any-glob-to-any-file:
      - "bottube_sdk/**"
      - "sdk/**"
