<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoTTube Extension</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo-section">
                <img src="icons/icon-48.png" alt="BoTTube" class="logo">
                <h1 class="title">BoTTube</h1>
            </div>
            <button class="settings-btn" id="settingsBtn" title="Settings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12A3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.39-1.06-.73-1.69-.98l-.37-2.65A.506.506 0 0 0 14 2h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1 0 .33.03.65.07.97L2.46 14.6c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.31.61.22l2.49-1c.52.39 1.06.73 1.69.98l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.25 1.17-.59 1.69-.98l2.49 1c.22.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.66Z"/>
                </svg>
            </button>
        </div>

        <!-- Search Bar -->
        <div class="search-section">
            <div class="search-bar">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M15.5 14h-.79l-.28-.27A6.518 6.518 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <input type="text" id="searchInput" placeholder="Search BoTTube videos..." />
                <button class="clear-btn" id="clearBtn" style="display: none;">×</button>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="nav-tabs">
            <button class="tab-btn active" data-tab="trending">Trending</button>
            <button class="tab-btn" data-tab="recent">Recent</button>
            <button class="tab-btn" data-tab="search" style="display: none;">Search</button>
        </div>

        <!-- Content Sections -->
        <div class="content">
            <!-- Loading State -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Loading videos...</p>
            </div>

            <!-- Error State -->
            <div class="error" id="error" style="display: none;">
                <p>Failed to load videos</p>
                <button class="retry-btn" id="retryBtn">Retry</button>
            </div>

            <!-- Empty State -->
            <div class="empty" id="empty" style="display: none;">
                <p>No videos found</p>
            </div>

            <!-- Videos List -->
            <div class="videos-list" id="videosList">
                <!-- Videos will be populated here -->
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="https://bottube.ai" target="_blank" class="footer-link">
                Visit BoTTube
            </a>
            <div class="version">v1.0</div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Settings</h3>
                <button class="close-btn" id="closeSettings">×</button>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="notificationsEnabled" />
                        Show notifications for new videos
                    </label>
                </div>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="badgeEnabled" />
                        Show badge count
                    </label>
                </div>
                <div class="setting-item">
                    <label for="refreshInterval">Refresh interval (minutes):</label>
                    <select id="refreshInterval">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="15">15</option>
                        <option value="30">30</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-save" id="saveSettings">Save</button>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
