<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoTTube Extension</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="icon48.png" alt="BoTTube" class="logo-img">
                <h1 class="logo-text">BoTTube</h1>
            </div>
            <div class="notification-badge" id="notificationBadge">
                <span id="badgeCount">3</span>
            </div>
        </header>

        <div class="search-section">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search BoTTube videos..." class="search-input">
                <button id="searchBtn" class="search-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
            </div>
        </div>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="trending">Trending</button>
            <button class="tab-btn" data-tab="recent">Recent</button>
            <button class="tab-btn" data-tab="favorites">My Votes</button>
        </nav>

        <div class="content">
            <div id="loadingSpinner" class="loading hidden">
                <div class="spinner"></div>
                <p>Loading videos...</p>
            </div>

            <div id="trendingTab" class="tab-content active">
                <div class="video-list" id="trendingVideos">
                    <!-- Videos will be populated by JavaScript -->
                </div>
            </div>

            <div id="recentTab" class="tab-content">
                <div class="video-list" id="recentVideos">
                    <!-- Videos will be populated by JavaScript -->
                </div>
            </div>

            <div id="favoritesTab" class="tab-content">
                <div class="video-list" id="favoriteVideos">
                    <div class="empty-state">
                        <p>No voted videos yet</p>
                        <small>Videos you vote on will appear here</small>
                    </div>
                </div>
            </div>

            <div id="searchResults" class="tab-content">
                <div class="video-list" id="searchVideoList">
                    <!-- Search results will be populated here -->
                </div>
            </div>
        </div>

        <footer class="footer">
            <div class="footer-links">
                <a href="#" id="uploadBtn" class="footer-link">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7,10 12,15 17,10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Upload
                </a>
                <a href="#" id="settingsBtn" class="footer-link">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1 1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                    Settings
                </a>
                <a href="https://bottube.ai" target="_blank" class="footer-link">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15,3 21,3 21,9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                    Open BoTTube
                </a>
            </div>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>
</html>
